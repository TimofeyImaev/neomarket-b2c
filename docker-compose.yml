services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: b2c
      POSTGRES_PASSWORD: b2c
      POSTGRES_DB: b2c
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2c"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://b2c:b2c@db:5432/b2c
      JWT_SECRET: dev-secret-change-me
      B2B_BASE_URL: http://b2b:8000
      B2B_SERVICE_KEY: dev-service-key
    ports: ["8000:8000"]
